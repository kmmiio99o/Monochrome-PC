name: Build and Release

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            target: linux
          - os: ubuntu-24.04-arm
            arch: arm64
            target: linux
          - os: windows-latest
            arch: x64
            target: win
          - os: macos-latest
            arch: x64
            target: mac
          - os: macos-latest
            arch: arm64
            target: mac
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build TypeScript
        run: npx tsc

      - name: Build electron app
        run: npx electron-builder --${{ matrix.target }} --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monochrome-player-${{ matrix.target }}-${{ matrix.arch }}
          path: dist/*

  pkgbuild:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install makepkg deps
        run: |
          pacman -Syu --noconfirm base-devel nodejs npm git electron

      - name: Build PKGBUILD
        run: |
          useradd -m builder
          chown -R builder:builder .
          su builder -c "makepkg -sf --noconfirm"

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: monochrome-player-arch
          path: ./*.pkg.tar.zst

  nix:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build Nix derivation
        run: nix build .#monochrome-player

      - name: Upload Nix derivation
        uses: actions/upload-artifact@v4
        with:
          name: monochrome-player-nix
          path: result

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, pkgbuild, nix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Monochrome Player ${{ github.ref_name }}
          body: |
            ## Monochrome Player ${{ github.ref_name }}

            ### Downloads
            - **Linux**: AppImage, deb, rpm, pacman
            - **Windows**: NSIS installer, portable
            - **macOS**: DMG, ZIP (Intel & Apple Silicon)
            - **Arch Linux**: prebuilt .pkg.tar.zst package
            - **NixOS**: flake.nix — `nix run github:kmmiio99o/Monochrome-PC`
          files: |
            artifacts/*/*
          fail_on_unmatched_files: false
          generate_release_notes: true
