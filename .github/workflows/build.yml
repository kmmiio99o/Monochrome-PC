name: Build and Release

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            target: linux
          - os: ubuntu-24.04-arm
            arch: arm64
            target: linux
          - os: windows-latest
            arch: x64
            target: win
          - os: macos-latest
            arch: x64
            target: mac
          - os: macos-latest
            arch: arm64
            target: mac
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build TypeScript
        run: bun tsc

      - name: Build electron app
        run: bun electron-builder --${{ matrix.target }} --${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up artifacts
        shell: bash
        run: |
          rm -f dist/*.blockmap dist/latest-*.yml dist/builder-debug.yml dist/elevate.exe
          rm -rf dist/win-unpacked dist/linux-unpacked dist/mac-unpacked

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monochrome-player-${{ matrix.target }}-${{ matrix.arch }}
          path: dist/*

  pkgbuild:
    needs: [build]
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Install makepkg deps
        run: |
          pacman -Syu --noconfirm base-devel unzip
          curl -fsSL https://bun.sh/install | bash
          cp ~/.bun/bin/bun /usr/local/bin/bun

      - name: Create source tarball from checkout
        run: |
          ver="${{ steps.version.outputs.VERSION }}"
          mkdir -p "Monochrome-PC-$ver"
          cp -r assets bun.lock flake.nix LICENSE package.json PKGBUILD src tsconfig.json .gitignore VERSION "Monochrome-PC-$ver/"
          tar czf "monochrome-player-bin-$ver.tar.gz" "Monochrome-PC-$ver"
          rm -rf "Monochrome-PC-$ver"

      - name: Build PKGBUILD
        run: |
          useradd -m builder
          chown -R builder:builder .
          su builder -c "makepkg -f --noconfirm --nodeps"

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: monochrome-player-arch
          path: ./*.pkg.tar.zst

  nix:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build Nix derivation
        run: nix build .#monochrome-player --option sandbox false

      - name: Upload Nix derivation
        uses: actions/upload-artifact@v4
        with:
          name: monochrome-player-nix
          path: result

  release:
    needs: [build, pkgbuild, nix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin --delete refs/tags/"$TAG" 2>/dev/null || true

          cat > notes.md <<- EOF
          ## Downloads

          | File | Platform |
          |------|----------|
          | \`.AppImage\` | Linux (portable) |
          | \`.deb\` | Debian / Ubuntu |
          | \`.rpm\` | Fedora / RHEL |
          | \`.dmg\` | macOS (Intel) |
          | \`.zip\` | macOS (Intel, portable) |
          | \`-arm64.dmg\` | macOS (Apple Silicon) |
          | \`-arm64-mac.zip\` | macOS (Apple Silicon, portable) |
          | \`.exe\` | Windows (installer & portable) |
          | \`.pkg.tar.zst\` | Arch Linux |

          ### NixOS

          \`\`\`
          nix run github:kmmiio99o/Monochrome-PC
          \`\`\`

          Or add to your flake inputs:

          \`\`\`nix
          inputs.monochrome-player.url = "github:kmmiio99o/Monochrome-PC";
          \`\`\`

          EOF

          gh release create "$TAG" --title "$TAG" --notes-file notes.md --target "${{ github.sha }}"
          find artifacts -type f \
            \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \
               -o -name "*.dmg" -o -name "*.zip" -o -name "*.exe" \
               -o -name "*.pkg.tar.zst" -o -name "result" \) \
            -exec gh release upload "$TAG" {} --clobber \;
