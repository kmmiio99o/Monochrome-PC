name: Check

on:
  push:
    branches: ["dev"]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: TypeScript type check
        run: bun tsc

      - name: ESLint
        run: bun run lint

      - name: Prettier format check
        run: bun run format:check
